name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint with Ruff
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          
      - name: Set up Python
        run: uv python install 3.14.3

      - name: Install dependencies
        run: uv sync

      - name: Run Ruff Check
        run: uv run ruff check --output-format=github .

      - name: Run Ruff Format Check
        run: uv run ruff format --check .

  test:
    name: Run Pytest
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/test_db
      VALKEY_URL: redis://localhost:6379/0
      ENVIRONMENT: test
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d test_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14.3

      - name: Install dependencies
        run: uv sync

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Run startup smoke test
        run: uv run python -c "from main import create_app; create_app()"

      - name: Run Tests
        run: |
          set +e
          uv run pytest --junitxml=pytest.xml
          pytest_exit_code=$?

          python - <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          report_path = Path("pytest.xml")

          lines = ["## Pytest Summary", ""]

          if report_path.exists():
              root = ET.parse(report_path).getroot()
              suite = root if root.tag == "testsuite" else root.find("testsuite")

              if suite is not None:
                  tests = int(suite.attrib.get("tests", 0))
                  failures = int(suite.attrib.get("failures", 0))
                  errors = int(suite.attrib.get("errors", 0))
                  skipped = int(suite.attrib.get("skipped", 0))
                  passed = tests - failures - errors - skipped

                  lines.extend(
                      [
                          f"- Passed: {passed}",
                          f"- Failed: {failures}",
                          f"- Errors: {errors}",
                          f"- Skipped: {skipped}",
                          f"- Total: {tests}",
                      ]
                  )

                  failed_cases: list[str] = []
                  for case in suite.iter("testcase"):
                      if case.find("failure") is None and case.find("error") is None:
                          continue

                      classname = case.attrib.get("classname", "")
                      name = case.attrib.get("name", "")
                      if classname:
                          failed_cases.append(f"{classname}::{name}")
                      else:
                          failed_cases.append(name)

                  if failed_cases:
                      lines.extend(["", "### Failed Tests"])
                      lines.extend(
                          f"- `{case}`" for case in failed_cases[:20]
                      )

                      if len(failed_cases) > 20:
                          lines.append(
                              f"- ... and {len(failed_cases) - 20} more"
                          )
              else:
                  lines.append("- Could not parse pytest results.")
          else:
              lines.append("- No pytest report generated.")

          with summary_path.open("a", encoding="utf-8") as summary_file:
              summary_file.write("\n".join(lines) + "\n")
          PY

          exit $pytest_exit_code
